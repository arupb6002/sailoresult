<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sa Result | Assam Top 3 Checker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b2b40 0%, #1a4c5e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      position: relative;
    }

    /* main card */
    .result-card-container {
      max-width: 580px;
      width: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* header style */
    .sa-header {
      background: #ffd966;
      background: linear-gradient(135deg, #ffcf4a, #ffb347);
      padding: 1.5rem 1.8rem;
      text-align: center;
      border-bottom: 4px solid #d18f00;
    }

    .sa-header h1 {
      font-size: 2.6rem;
      letter-spacing: 2px;
      font-weight: 800;
      color: #1e2f3a;
      text-shadow: 2px 2px 0 rgba(255, 215, 120, 0.8);
      word-break: keep-all;
    }

    .sa-header p {
      font-size: 0.85rem;
      font-weight: 600;
      color: #2c3e2f;
      background: #fef5e0;
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      margin-top: 8px;
    }

    /* main form area */
    .form-panel {
      padding: 2rem 2rem 1.8rem;
    }

    /* box styling (3 boxes + button) */
    .input-field {
      margin-bottom: 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-field label {
      font-weight: 700;
      font-size: 0.9rem;
      color: #1f4e5c;
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-field label i {
      font-style: normal;
      background: #eef2f5;
      padding: 0 8px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: normal;
    }

    .input-field input {
      width: 100%;
      padding: 14px 18px;
      font-size: 1.05rem;
      border: 2px solid #e2e8f0;
      border-radius: 24px;
      background: white;
      transition: all 0.2s;
      font-weight: 500;
      outline: none;
      color: #0a2f3a;
    }

    .input-field input:focus {
      border-color: #ffb347;
      box-shadow: 0 0 0 3px rgba(255, 180, 71, 0.3);
    }

    /* fixed B26 style */
    .fixed-badge {
      background: #f1f9fe;
      border-color: #cbd5e1;
      color: #1f5e6e;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .fixed-badge:read-only {
      cursor: default;
      background-color: #eef2fa;
    }

    /* button */
    .check-btn {
      width: 100%;
      background: linear-gradient(95deg, #1f7a5a, #2c9c7c);
      border: none;
      padding: 15px 10px;
      font-size: 1.25rem;
      font-weight: 800;
      color: white;
      border-radius: 60px;
      cursor: pointer;
      margin-top: 12px;
      transition: 0.2s;
      box-shadow: 0 8px 14px rgba(0, 0, 0, 0.1);
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .check-btn:hover:not(:disabled) {
      background: linear-gradient(95deg, #166b4f, #238b6a);
      transform: scale(0.98);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .check-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* error & loading */
    .error-msg {
      background: #fff0f0;
      border-left: 6px solid #e53e3e;
      padding: 12px 16px;
      border-radius: 20px;
      margin: 20px 0 0;
      color: #b91c1c;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .loading-area {
      background: #eef5ff;
      border-radius: 28px;
      padding: 16px;
      margin-top: 24px;
      text-align: center;
      font-weight: 600;
      color: #22668d;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-size: 1rem;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #cbd5e1;
      border-top: 3px solid #ff8c42;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* result card */
    .result-box {
      background: linear-gradient(120deg, #eef9f2, #ffffff);
      border-radius: 28px;
      margin-top: 28px;
      padding: 1.5rem 1.8rem;
      border: 1px solid #b7e0c8;
      box-shadow: 0 8px 18px rgba(0, 32, 32, 0.08);
      transition: all 0.2s;
    }

    .result-success {
      font-size: 1.35rem;
      font-weight: 800;
      color: #1f8a4c;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 2px dashed #c1e0cf;
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .result-success:before {
      content: "✔️";
      font-size: 1.6rem;
    }

    .result-detail {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      font-size: 1.05rem;
      padding: 6px 0;
      border-bottom: 1px dotted #cbd5e1;
    }

    .detail-label {
      font-weight: 700;
      color: #235b4a;
      letter-spacing: 0.3px;
    }

    .detail-value {
      font-weight: 800;
      color: #0a2f2a;
      background: #eef3ea;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 1rem;
    }

    .rank-badge {
      background: #fdebb3;
      color: #9b6a0c;
      font-weight: 800;
      padding: 5px 15px;
      border-radius: 30px;
      display: inline-block;
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      padding: 1rem 1rem 1.5rem;
      color: #668b8f;
      border-top: 1px solid #e2f0ec;
      margin-top: 8px;
    }

    @media (max-width: 500px) {
      .form-panel {
        padding: 1.5rem;
      }
      .sa-header h1 {
        font-size: 2rem;
      }
      .detail-line {
        flex-direction: column;
        gap: 5px;
      }
      .detail-value {
        align-self: flex-start;
      }
    }
  </style>
</head>
<body>
<div class="result-card-container">
  <div class="sa-header">
    <h1>🎓 SAI LO RESULT</h1>
    <p>Board Of Secondary Education, Assam • 2026</p>
  </div>

  <div class="form-panel">
    <!-- BOX 1: fixed B26 - cannot be edited -->
    <div class="input-field">
      <label>📌 BATCH IDENTITY <i>fixed code</i></label>
      <input type="text" id="fixedBatch" class="fixed-badge" value="B26" readonly disabled style="background:#eef2fa; cursor:default;">
      <!-- note: disabled but we use readonly + disabled for consistent style, though user cannot edit anyway -->
    </div>

    <!-- BOX 2: centre code (4 digit numeric) -->
    <div class="input-field">
      <label>🏛️ CENTRE CODE <i>4-digit required</i></label>
      <input type="text" id="centreCode" placeholder="e.g., 0684" maxlength="4" inputmode="numeric" autocomplete="off">
      <small style="color:#5b7c85; font-size:0.7rem;">* Example: 0684, 1023</small>
    </div>

    <!-- BOX 3: roll number (4 digit numeric) -->
    <div class="input-field">
      <label>📋 ROLL NUMBER <i>4-digit required</i></label>
      <input type="text" id="rollNumber" placeholder="e.g., 1001" maxlength="4" inputmode="numeric" autocomplete="off">
      <small style="color:#5b7c85; font-size:0.7rem;">* Example: 1001, 0452</small>
    </div>

    <!-- CHECK BUTTON -->
    <button class="check-btn" id="checkBtn">🔍 CHECK RESULT</button>

    <!-- error message container -->
    <div id="errorMessage" class="error-msg" style="display: none;"></div>

    <!-- loading simulation (3s) -->
    <div id="loadingIndicator" class="loading-area" style="display: none;">
      <div class="spinner"></div>
      <span>⏳ Verifying records • Please wait 3 seconds...</span>
    </div>

    <!-- result display area -->
    <div id="resultDisplay" class="result-box" style="display: none;"></div>
  </div>
  <footer>
    ⚡ Official Sai Lo Result Portal | Devloped By Arup Borah
  </footer>
</div>

<script>
  // DOM elements
  const fixedBox = document.getElementById('fixedBatch');
  const centreInput = document.getElementById('centreCode');
  const rollInput = document.getElementById('rollNumber');
  const checkBtn = document.getElementById('checkBtn');
  const errorDiv = document.getElementById('errorMessage');
  const loadingDiv = document.getElementById('loadingIndicator');
  const resultDiv = document.getElementById('resultDisplay');

  // Utility: hide error, hide result, clear any pending timeouts
  let activeTimeout = null;

  function clearMessagesAndTimeout() {
    if (activeTimeout) {
      clearTimeout(activeTimeout);
      activeTimeout = null;
    }
    errorDiv.style.display = 'none';
    errorDiv.innerText = '';
    // we don't hide result here globally, but new check will hide it anyway
  }

  // Hide result and loading specifically
  function resetUIForNewCheck() {
    if (resultDiv) resultDiv.style.display = 'none';
    resultDiv.innerHTML = '';
    loadingDiv.style.display = 'none';
    clearMessagesAndTimeout();
  }

  // enable/disable all interactive fields during checking simulation
  function setFormEnabledState(enabled) {
    // centre and roll inputs
    centreInput.disabled = !enabled;
    rollInput.disabled = !enabled;
    // button enabled/disabled
    checkBtn.disabled = !enabled;
    // fixed B26 is already disabled/readonly, but we keep it as is, no need to change
    // but during checking we might also want to disable fixed box style? It's readonly+disabled, but no interaction anyway
    if (!enabled) {
      centreInput.style.opacity = '0.7';
      rollInput.style.opacity = '0.7';
    } else {
      centreInput.style.opacity = '1';
      rollInput.style.opacity = '1';
    }
  }

  // validation: centre code and roll number exactly 4 digits
  function validateInputs() {
    let centreVal = centreInput.value.trim();
    let rollVal = rollInput.value.trim();

    // regex for exactly 4 digits
    const fourDigitRegex = /^\d{4}$/;

    if (!fourDigitRegex.test(centreVal)) {
      errorDiv.innerText = '❌ Centre Code must be exactly 4 digits (e.g., 0684).';
      errorDiv.style.display = 'block';
      return false;
    }
    if (!fourDigitRegex.test(rollVal)) {
      errorDiv.innerText = '❌ Roll Number must be exactly 4 digits (e.g., 1001).';
      errorDiv.style.display = 'block';
      return false;
    }
    return true;
  }

  // restrict input fields to only digits & max length (live filtering)
  function enforceNumericOnly(inputElement) {
    inputElement.addEventListener('input', function(e) {
      let raw = this.value;
      let filtered = raw.replace(/\D/g, '');
      if (filtered.length > 4) filtered = filtered.slice(0, 4);
      if (this.value !== filtered) {
        this.value = filtered;
      }
    });
  }

  // enforce 4-digit length and numeric pattern
  enforceNumericOnly(centreInput);
  enforceNumericOnly(rollInput);

  // Additional: on blur, check if length <4 show hint but not error global, we rely on validation on click
  centreInput.addEventListener('blur', function() {
    let val = this.value.trim();
    if (val.length > 0 && val.length !== 4) {
      // gentle hint but not blocking
      errorDiv.innerText = 'ℹ️ Centre code should be 4 digits.';
      errorDiv.style.display = 'block';
      setTimeout(() => {
        if (errorDiv.innerText.includes('Centre code should be 4 digits')) {
          errorDiv.style.display = 'none';
        }
      }, 2000);
    } else if (val.length === 0) {
      // optional, just reset if needed
    } else if (val.length === 4) {
      if (errorDiv.innerText.includes('Centre code should be 4 digits')) errorDiv.style.display = 'none';
    }
  });

  rollInput.addEventListener('blur', function() {
    let val = this.value.trim();
    if (val.length > 0 && val.length !== 4) {
      errorDiv.innerText = 'ℹ️ Roll number should be 4 digits.';
      errorDiv.style.display = 'block';
      setTimeout(() => {
        if (errorDiv.innerText.includes('Roll number should be 4 digits')) {
          errorDiv.style.display = 'none';
        }
      }, 2000);
    }
  });

  // main check action
  function onCheckResult() {
    // Clear previous timeouts & UI errors/results
    resetUIForNewCheck();

    // validate both fields
    if (!validateInputs()) {
      // validation failed: error already shown, no loading, ensure fields enabled (they are already)
      setFormEnabledState(true); // just in case
      return;
    }

    // Capture current values for result display (centre not used but roll needed)
    const centreValue = centreInput.value.trim();
    const rollValue = rollInput.value.trim();

    // Hide any lingering error & start loading
    errorDiv.style.display = 'none';
    errorDiv.innerText = '';

    // show loading indicator
    loadingDiv.style.display = 'flex';
    // disable fields & button during fake checking (3 secs)
    setFormEnabledState(false);

    // set timer for 3 seconds
    activeTimeout = setTimeout(() => {
      // After 3 seconds, display the result exactly as required:
      // "Result Fatched Successfully", rollno, result - "597/600", Rank: Assam top 3
      // Build result HTML
      const resultHtml = `
        <div class="result-success">Result Fatched Successfully</div>
        <div class="result-detail">
          <div class="detail-line">
            <span class="detail-label">🎯 Roll Number :</span>
            <span class="detail-value">${escapeHtml(rollValue)}</span>
          </div>
          <div class="detail-line">
            <span class="detail-label">📊 RESULT :</span>
            <span class="detail-value">597/600</span>
          </div>
          <div class="detail-line">
            <span class="detail-label">🏆 RANK :</span>
            <span class="detail-value rank-badge">Assam top 3 🎓</span>
          </div>
          <div class="detail-line" style="border-bottom:none; margin-top:8px;">
            <span class="detail-label">🏅 Board Status :</span>
            <span class="detail-value">🌟 Distinction (Top Performer)</span>
          </div>
        </div>
        <div style="margin-top: 16px; font-size:0.8rem; text-align:center; color:#3e7b6e;">
          <span>✅ Verified • Centre ${escapeHtml(centreValue)}</span>
        </div>
      `;

      resultDiv.innerHTML = resultHtml;
      resultDiv.style.display = 'block';

      // hide loading
      loadingDiv.style.display = 'none';
      // re-enable all fields and button for next check
      setFormEnabledState(true);

      // Additional small effect: clear active timeout reference
      activeTimeout = null;

      // Optional: scroll to result smoothly
      resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 3000); // exactly 3 seconds
  }

  // simple XSS prevention
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // Event listener for button
  checkBtn.addEventListener('click', onCheckResult);

  // Prevent accidental double-tap during loading? already handled by disabling button
  // Additional micro interaction: on pressing enter key on any input, trigger check
  const inputs = [centreInput, rollInput];
  inputs.forEach(inp => {
    inp.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (!checkBtn.disabled) {
          onCheckResult();
        }
      }
    });
  });

  // Set initial first box text: B26 already fixed, but just ensure it's B26
  // Also ensure it's properly styled and no one can edit (it's disabled + readonly originally)
  fixedBox.value = "B26";
  // optional - tooltip
  fixedBox.title = "Fixed Batch Code (B26) • Non-editable";

  // extra nuance: if the user tries to paste non-numeric in centre/roll, filter handles it anyway.
  // perfect.
</script>
</body>
</html>
